receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317 #JavaAgent отправляет все метрики на порт через grpc

processors:
  memory_limiter: # каждые 10сек проверка сколько памяти используем, при использовании 80% памяти замедляем работу
    check_interval: 10s
    limit_percentage: 80
    spike_limit_percentage: 25 # если кол во памяти резко выросло на 25%, то начинаем дропать данные, приоритет важным метрикам
    # самые старые записи в буфере дропаются в первую очередь так же jvm метрики имеют низкий приоритет
  batch: # данные отправляются пакетами, если пакет не наполнился за 2сек - отправляем
    send_batch_size: 256
    timeout: 2s

connectors:
  routing: # используем два правила отбора метрик как в блоке catch - сначала точечно, потом общее
    table:
      - context: metric
        statement: route() where IsMatch(metric.name, "^messenger\\..*")   # префикс - кастомные метрики
        pipelines: [ metrics/business ]
      - context: metric
        statement: route() where true  # метрики, которые собираются автоматически
        pipelines: [ metrics/technical ]

exporters:
  kafka/business:
    brokers: [ "kafka:9092", "kafka2:9092", "kafka3:9093" ]
    protocol_version: "3.0.0"
    metrics:
      topic: "business-metrics"
      encoding: otlp_proto

  kafka/technical:
    brokers: [ "kafka:9092", "kafka2:9092", "kafka3:9093" ]
    protocol_version: "3.0.0"
    metrics:
      topic: "technical-metrics"
      encoding: otlp_proto

service: # описываем все что делает коллектор по порядку
  pipelines:
    metrics:
      receivers: [ otlp ]
      processors: [ memory_limiter, batch ]
      exporters: [ routing ]

    metrics/business:
      receivers: [ routing ]
      exporters: [ kafka/business ]

    metrics/technical:
      receivers: [ routing ]
      exporters: [ kafka/technical ]
