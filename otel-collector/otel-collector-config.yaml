receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317 #JavaAgent отправляет все метрики на порт через grpc

processors:
  filter/keep_only_important_metrics:
    error_mode: ignore
    metrics:
      datapoint:
        - 'metric.name == "http.server.request.duration" and (attributes["http.request.method"] != "GET" or attributes["http.route"] != "/api/chats")'
        - 'metric.name == "jvm.thread.count" and attributes["jvm.thread.state"] != "runnable"'
        - '(metric.name == "jvm.memory.used" or metric.name == "jvm.memory.limit" or metric.name == "jvm.memory.committed") and attributes["jvm.memory.pool.name"] != "G1 Old Gen"'
        - 'metric.name == "db.client.connections.usage" and attributes["state"] != "used"'
        - 'metric.name == "jvm.gc.duration" and attributes["jvm.gc.name"] != "G1 Young Generation"'
  memory_limiter: # каждые 10сек проверка сколько памяти используем, при использовании 80% памяти замедляем работу
    check_interval: 10s
    limit_percentage: 80
    spike_limit_percentage: 25 # если кол во памяти резко выросло на 25%, то начинаем дропать данные, приоритет важным метрикам
    # самые старые записи в буфере дропаются в первую очередь так же jvm метрики имеют низкий приоритет
  batch: # данные отправляются пакетами, если пакет не наполнился за 2сек - отправляем
    send_batch_size: 256
    timeout: 2s

connectors:
  routing: # используем два правила отбора метрик как в блоке catch - сначала точечно, потом общее
    table:
      - context: metric
        statement: route() where IsMatch(metric.name, "^messenger\\..*")   # префикс - кастомные метрики
        pipelines: [ metrics/business ]
      - context: metric
        statement: route() where true  # метрики, которые собираются автоматически
        pipelines: [ metrics/technical ]

exporters:
  kafka/business:
    brokers: [ "kafka:9092", "kafka2:9092", "kafka3:9092" ]
    protocol_version: "3.0.0"
    metrics:
      topic: "business-metrics"
      encoding: otlp_json

  kafka/technical:
    brokers: [ "kafka:9092", "kafka2:9092", "kafka3:9092" ]
    protocol_version: "3.0.0"
    metrics:
      topic: "technical-metrics"
      encoding: otlp_json

service: # описываем все что делает коллектор по порядку
  pipelines:
    metrics:
      receivers: [ otlp ]
      processors: [ memory_limiter, batch, filter/keep_only_important_metrics]
      exporters: [ routing ]

    metrics/business:
      receivers: [ routing ]
      exporters: [ kafka/business ]

    metrics/technical:
      receivers: [ routing ]
      exporters: [ kafka/technical ]
